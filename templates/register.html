{% extends "base.html" %}
{% block title %}註冊 — Linux Lab{% endblock %}
{% block content %}
<div style="max-width:400px;margin:4rem auto">
    <div class="card">
        <h2>📝 註冊帳號</h2>
        <p style="color:#94a3b8;margin-bottom:1rem">請輸入管理員已加入白名單的 Email，我們會寄送驗證碼給你。</p>
        <form method="POST">
            <label>Email</label>
            <input type="email" name="email" required autofocus placeholder="your@email.com">
            <button class="btn btn-primary" style="width:100%;margin-top:0.5rem">發送驗證碼</button>
        </form>
        <p style="margin-top:1rem;text-align:center;color:#94a3b8">
            已有帳號？<a href="{{ url_for('login') }}" style="color:#38bdf8">登入</a>
        </p>
    </div>
</div>
{% endblock %}
