{% extends "base.html" %}
{% block title %}設定密碼 — Linux Lab{% endblock %}
{% block content %}
<div style="max-width:400px;margin:4rem auto">
    <div class="card">
        <h2>🔑 {{ '重設密碼' if is_reset else '設定密碼' }}</h2>
        <p style="color:#94a3b8;margin-bottom:1rem">Email 已驗證：<strong>{{ email }}</strong></p>
        <form method="POST">
            <input type="hidden" name="email" value="{{ email }}">
            <input type="hidden" name="token" value="{{ token }}">
            <label>密碼（至少 6 個字元）</label>
            <input type="password" name="password" required autofocus minlength="6" placeholder="設定密碼">
            <label>確認密碼</label>
            <input type="password" name="password_confirm" required minlength="6" placeholder="再輸入一次密碼">
            <button class="btn btn-primary" style="width:100%;margin-top:0.5rem">{{ '更新密碼' if is_reset else '建立帳號' }}</button>
        </form>
    </div>
</div>
{% endblock %}
